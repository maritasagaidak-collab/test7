{% extends "base.html" %}
{% block content %}
<div class="header">
    <h2 style="text-align: center; color: #4caf50; margin-top: 10px;">Expense Tracker</h2>
    <h1 class="balance-display {{ 'negative-glow' if total < 0 else '' }}">
        ${{ "%.2f"|format(total) }}
    </h1>
</div>
<div class="card">
    <canvas id="moneyGraph"></canvas>
</div>
<form action="{{ url_for('expenses.add_expense') }}" method="POST">
    <input type="text" name="item" placeholder="Назва товару" required>
    <input type="number" step="0.01" name="amount" placeholder="Ціна" required>
    <select name="category">
        <option value="Їжа">Їжа</option>
        <option value="Розваги">Розваги</option>
    </select>
    <button type="submit">ДОДАТИ</button>
</form>
<a href="{{ url_for('auth.logout') }}" style="display:block; text-align:center; color:#555; margin-top:20px; text-decoration:none;">Вийти</a>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const ctx = document.getElementById('moneyGraph').getContext('2d');
    let bal = {{ start_bal }};
    const balanceData = {{ values|tojson }}.map(v => {
        bal -= v;
        return bal;
    });
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: {{ labels|tojson }},
            datasets: [{
                data: balanceData,
                borderColor: '#4caf50',
                fill: true,
                tension: 0.4
            }]
        },
        options: { plugins: { legend: { display: false } } }
    });
</script>
{% endblock %}
