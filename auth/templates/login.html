{% extends "base.html" %}
{% block content %}
<div style="text-align: center;">
    <img src="{{ url_for('static', filename='user-icon.png') }}" style="width: 70px; margin-bottom: 20px;">
    <h1>Login</h1>
    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">LOGIN</button>
    </form>
    <p style="margin-top: 20px;"><a href="{{ url_for('auth.register') }}" style="color: #4caf50;">Register</a></p>
</div>
{% endblock %}
