<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; color: #212529; }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.03);
            background: #ffffff;
        }
        /* Порожній кружечок як на скріншоті */
        .circle-placeholder {
            width: 60px;
            height: 60px;
            background: #f1f3f5;
            border-radius: 50%;
            margin: 0 auto 25px;
        }
        .navbar { background: white; border-bottom: 1px solid #eee; padding: 20px 0; }
        .text-uppercase { letter-spacing: 1px; font-size: 0.85rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">TRACKER</a>
            <div class="ms-auto">
                <a href="/login" class="nav-link d-inline me-3">Увійти</a>
                <button class="btn btn-dark btn-sm px-3">Реєстрація</button>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
